version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: AuthApi-sql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "Sql@12345678"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
